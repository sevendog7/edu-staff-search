<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전남광주통합특별시교육청 직원 검색</title>
<style>
  :root{
    --blue:#2f5fdb;
    --blue-dark:#1f45ad;
    --blue-soft:#eef2ff;
    --ink:#1c2333;
    --sub:#6b7280;
    --line:#e6e8ee;
    --bg:#f5f7fb;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:960px;
    margin:0 auto;
    padding:36px 20px 80px;
  }
  header{
    text-align:center;
    margin-bottom:24px;
  }
  header h1{
    font-size:26px;
    font-weight:800;
    letter-spacing:-0.02em;
    color:var(--blue-dark);
    margin:0 0 10px;
  }
  header p{
    font-size:13px;
    color:var(--sub);
    line-height:1.6;
    margin:0;
  }
  .quicklinks{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    margin:20px 0 24px;
  }
  .quicklinks a{
    display:inline-block;
    padding:9px 22px;
    border-radius:999px;
    background:#fff;
    border:1px solid var(--line);
    color:var(--ink);
    font-size:14px;
    font-weight:600;
    text-decoration:none;
    transition:background .15s, color .15s, border-color .15s;
  }
  .quicklinks a:hover{
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
  }

  .card{
    background:var(--card);
    border-radius:18px;
    box-shadow:0 1px 3px rgba(20,30,60,.06), 0 8px 24px rgba(20,30,60,.05);
    padding:22px 22px 26px;
    margin-bottom:18px;
  }
  .card h2{
    font-size:16px;
    font-weight:700;
    margin:0 0 14px;
  }

  .search-row{
    display:flex;
    gap:10px;
  }
  .search-row input{
    flex:1;
    padding:13px 16px;
    border-radius:12px;
    border:1px solid var(--line);
    font-size:15px;
    outline:none;
    background:#fafbfe;
  }
  .search-row input:focus{
    border-color:var(--blue);
    background:#fff;
  }
  .search-row button{
    padding:0 24px;
    border-radius:12px;
    border:none;
    background:var(--blue);
    color:#fff;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }
  .search-row button:hover{background:var(--blue-dark);}

  .tabbar{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:6px;
    scrollbar-width:thin;
  }
  .tabbar::-webkit-scrollbar{height:5px;}
  .tabbar::-webkit-scrollbar-thumb{background:#d8dce6;border-radius:10px;}
  .tab-btn{
    flex:0 0 auto;
    padding:9px 16px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fafbfe;
    color:var(--ink);
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .tab-btn:hover{border-color:var(--blue);}
  .tab-btn.active{
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
  }

  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:16px 0 8px;
    font-size:12.5px;
    color:var(--sub);
  }
  .meta-row .count strong{color:var(--blue-dark);}
  .clear-btn{
    border:none;
    background:none;
    color:var(--sub);
    font-size:12.5px;
    text-decoration:underline;
    cursor:pointer;
    padding:0;
  }

  .group{
    margin-bottom:14px;
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
  }
  .group-head{
    background:var(--blue-soft);
    padding:10px 16px;
    font-size:13.5px;
    font-weight:700;
    color:var(--blue-dark);
  }
  .group-head span{
    font-weight:500;
    color:var(--sub);
    margin-left:6px;
  }
  table{
    width:100%;
    border-collapse:collapse;
  }
  thead th{
    text-align:left;
    font-size:12px;
    color:var(--sub);
    font-weight:600;
    padding:8px 16px;
    border-bottom:1px solid var(--line);
    background:#fbfbfd;
  }
  tbody td{
    padding:10px 16px;
    font-size:13.5px;
    border-bottom:1px solid #f0f1f5;
    vertical-align:middle;
  }
  tbody tr:last-child td{border-bottom:none;}
  td.team{color:var(--sub);font-size:12.5px;}
  td.name{font-weight:700;}
  td.title{color:var(--sub);white-space:nowrap;}
  a.tel{
    color:var(--blue);
    font-weight:700;
    text-decoration:none;
  }
  a.tel:hover{text-decoration:underline;}
  .muted{color:#b7bcc8;}

  .empty{
    text-align:center;
    color:var(--sub);
    font-size:13.5px;
    padding:40px 10px;
  }
  .footnote{
    text-align:center;
    font-size:11.5px;
    color:#b7bcc8;
    margin-top:28px;
  }

  @media (max-width:560px){
    .wrap{padding:24px 12px 60px;}
    header h1{font-size:21px;}
    .search-row button{padding:0 16px;}
    thead th:nth-child(2), td.team{display:none;}
  }
</style>
</head>

// 국명 -> 표시 그룹 매핑
const GROUPS = [
  { label: "교육감", match: g => g === "교육감실" },
  { label: "부교육감", match: g => g === "부교육감실" },
  { label: "홍보담당관", match: g => g === "홍보담당관" },
  { label: "감사관", match: g => g === "감사관" },
  { label: "K-교육통합추진단", match: g => g === "K-교육통합추진단" },
  { label: "기획조정실", match: g => g === "기획조정실" },
  { label: "미래성장국", match: g => g === "미래성장국" },
  { label: "인재교육국", match: g => g === "인재교육국" },
  { label: "행정운영국", match: g => g === "행정운영국" },
  { label: "미래정책국", match: g => g === "미래정책국" },
  { label: "학교교육국", match: g => g === "학교교육국" },
  { label: "교육행정국", match: g => g === "교육행정국" },
  { label: "직속기관", match: g => g === "직속기관" },
  { label: "교육지원청", match: g => g === "지원청" },
  { label: "의회 및 협력", match: g => g && (
      g.includes("의회") ||
      g.includes("교육협력관실") ||
      g.includes("관학협력센터") ||
      g.includes("부설") ||
      g === "어린이집" ||
      g === "(재)전남교육 꿈실현재단" ||
      g === "(재)광주희망사다리교육재단" ||
      g === "파견" ||
      g === "전국시도교육감협의회" ||
      g === "전남광주통합특별시자치경찰위원회"
    ) },
];

const tabbar = document.getElementById("tabbar");
const resultsArea = document.getElementById("resultsArea");
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");

let activeTabIndex = null;

GROUPS.forEach((grp, i) => {
  const btn = document.createElement("button");
  btn.className = "tab-btn";
  btn.textContent = grp.label;
  btn.addEventListener("click", () => {
    searchInput.value = "";
    if (activeTabIndex === i) {
      activeTabIndex = null;
      render([]);
      updateTabs();
      return;
    }
    activeTabIndex = i;
    updateTabs();
    const list = STAFF.filter(s => grp.match(s.g, s.d));
    render(list, grp.label);
  });
  tabbar.appendChild(btn);
});

function updateTabs(){
  [...tabbar.children].forEach((b,i) => {
    b.classList.toggle("active", i === activeTabIndex);
  });
}

function renderPhone(str){
  if(!str) return '<span class="muted">-</span>';
  const escaped = str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return escaped.replace(/(\d{2,3}-\d{3,4}-\d{4})/g, (m) => {
    const dialable = m.replace(/-/g, "");
    return `<a class="tel" href="tel:${dialable}">${m}</a>`;
  });
}

function esc(str){
  return (str || "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function render(list, headingLabel){
  resultsArea.innerHTML = "";

  const meta = document.createElement("div");
  meta.className = "meta-row";
  meta.innerHTML = `<span class="count">검색 결과 <strong>${list.length}</strong>건${headingLabel ? " · " + esc(headingLabel) : ""}</span>` +
    (list.length ? `<button class="clear-btn" id="clearBtn">초기화</button>` : "");
  resultsArea.appendChild(meta);

  const clearBtn = document.getElementById("clearBtn");
  if(clearBtn){
    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      activeTabIndex = null;
      updateTabs();
      render([]);
    });
  }

  if(list.length === 0){
    const empty = document.createElement("div");
    empty.className = "card empty";
    empty.textContent = "검색어를 입력하거나 위에서 기관을 선택해 주세요.";
    resultsArea.appendChild(empty);
    return;
  }

  // 국 > 과 > 팀 순으로 그룹핑
  const byDept = new Map();
  list.forEach(s => {
    const key = `${s.g} / ${s.d}`;
    if(!byDept.has(key)) byDept.set(key, []);
    byDept.get(key).push(s);
  });

  byDept.forEach((rows, key) => {
    const groupEl = document.createElement("div");
    groupEl.className = "group";

    const head = document.createElement("div");
    head.className = "group-head";
    head.innerHTML = `${esc(rows[0].g)}<span>${(rows[0].d && rows[0].d !== rows[0].g) ? " · " + esc(rows[0].d) : ""}</span>`;
    groupEl.appendChild(head);

    const table = document.createElement("table");
    table.innerHTML = `
      <thead>
        <tr>
          <th style="width:26%">팀</th>
          <th style="width:16%">직책</th>
          <th style="width:18%">성명</th>
          <th>전화번호</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(s => `
          <tr>
            <td class="team">${esc(s.t)}</td>
            <td class="title">${esc(s.p)}</td>
            <td class="name">${esc(s.n)}</td>
            <td>${renderPhone(s.ph)}</td>
          </tr>
        `).join("")}
      </tbody>
    `;
    groupEl.appendChild(table);
    resultsArea.appendChild(groupEl);
  });
}

function doSearch(){
  const q = searchInput.value.trim().toLowerCase();
  activeTabIndex = null;
  updateTabs();
  if(!q){
    render([]);
    return;
  }
  const list = STAFF.filter(s =>
    (s.n && s.n.toLowerCase().includes(q)) ||
    (s.g && s.g.toLowerCase().includes(q)) ||
    (s.d && s.d.toLowerCase().includes(q)) ||
    (s.t && s.t.toLowerCase().includes(q)) ||
    (s.p && s.p.toLowerCase().includes(q))
  );
  render(list, `"${searchInput.value.trim()}" 검색`);
}

searchBtn.addEventListener("click", doSearch);
searchInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter") doSearch();
});
searchInput.addEventListener("input", () => {
  if(searchInput.value.trim().length >= 1){
    doSearch();
  } else if (activeTabIndex === null) {
    render([]);
  }
});

// 초기 상태
render([]);
</script>
</body>
</html>
