                noResult.classList.add('hidden');
                resultCount.innerText = `총 ${data.length}명`;
                
                const fragment = document.createDocumentFragment();
                data.forEach(emp => {
                    const el = document.createElement('div');
                    el.className = "bg-white p-4 sm:px-6 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition-all hover:shadow-md hover:border-blue-200";
                    
                    const teamStr = emp.team ? ` &gt; ${emp.team}` : '';
                    const nameStr = emp.name && emp.name !== "-" ? emp.name : `<span class="text-slate-400 italic">공석/미지정</span>`;
                    
                    el.innerHTML = `
                        <div class="flex-1 min-w-0">
                            <div class="text-xs font-semibold text-slate-500 mb-1 flex items-center gap-1 flex-wrap">
                                <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full text-[10px] whitespace-nowrap">${emp.category}</span>
                                <span class="truncate">${emp.dept}${teamStr}</span>
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-lg font-bold text-slate-900 truncate">${nameStr}</span>
                                <span class="text-xs font-medium bg-blue-50 text-blue-700 px-2 py-1 rounded shadow-sm border border-blue-100 whitespace-nowrap">${emp.pos}</span>
                            </div>
                        </div>
                        <div class="w-full sm:w-auto flex-shrink-0 flex justify-end">
                            ${formatPhoneUI(emp.phone)}
                        </div>
                    `;
                    fragment.appendChild(el);
                });
                resultList.appendChild(fragment);
            }
        }

        // 검색 및 필터 통합 로직
        function handleSearch() {
            const query = searchInput.value.toLowerCase().replace(/\s+/g, '');
            
            // 상호작용(탭 클릭 또는 텍스트 입력) 전이라면 초기 화면 유지
            if (!hasInteracted && query.length === 0) {
                initialState.classList.remove('hidden');
                resultContainer.classList.add('hidden');
                return;
            }

            // 상호작용 후에는 항상 결과를 표시
            hasInteracted = true;
            initialState.classList.add('hidden');
            resultContainer.classList.remove('hidden');

            let filtered = employees;

            // 1. 카테고리 필터 적용
            if (currentFilter !== '전체') {
                filtered = filtered.filter(e => e.category === currentFilter);
            }

            // 2. 텍스트 검색 적용 (실시간)
            if (query) {
                filtered = filtered.filter(e => 
                    (e.name && e.name.toLowerCase().includes(query)) ||
                    (e.dept && e.dept.toLowerCase().includes(query)) ||
                    (e.team && e.team.toLowerCase().includes(query)) ||
                    (e.pos && e.pos.toLowerCase().includes(query)) ||
                    (e.phone && e.phone.replace(/-/g, '').includes(query))
                );
            }

            render(filtered);
        }

        // 카테고리 탭 설정
        window.setFilter = function(category) {
            currentFilter = category;
            hasInteracted = true; // 탭을 클릭했으므로 상호작용 상태 활성화
            
            // 탭 클릭 시 검색어 초기화
            searchInput.value = '';
            
            // 버튼 UI 업데이트
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === category) {
                    btn.classList.add('bg-blue-100', 'text-blue-700');
                    btn.classList.remove('bg-slate-100', 'text-slate-600', 'hover:bg-slate-200');
                } else {
                    btn.classList.remove('bg-blue-100', 'text-blue-700');
                    btn.classList.add('bg-slate-100', 'text-slate-600', 'hover:bg-slate-200');
                }
            });
            
            handleSearch();
        };

        // 이벤트 리스너 (실시간 검색)
        searchInput.addEventListener('input', handleSearch);
        document.getElementById('searchBtn').addEventListener('click', handleSearch);

    </script>
</body>
</html>
