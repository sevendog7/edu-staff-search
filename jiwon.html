<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전남광주통합특별시 동부·서부교육지원청 직원검색기</title>
<style>
  :root{
    --navy:#0f2c52;
    --navy-deep:#0a1f3c;
    --blue:#1c4a86;
    --sky:#eef3fa;
    --line:#dde4ee;
    --ink:#1b2430;
    --sub:#6b7686;
    --accent:#c8792c;
    --white:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--sky);
    color:var(--ink);
  }
  header{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-deep) 100%);
    color:#fff;
    padding:28px 20px 24px;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:0 4px 14px rgba(10,31,60,.25);
  }
  header h1{
    margin:0 0 4px;
    font-size:19px;
    font-weight:700;
    letter-spacing:-0.2px;
  }
  header p{
    margin:0 0 16px;
    font-size:12.5px;
    color:#b9c8de;
  }
  .search-wrap{
    position:relative;
    max-width:760px;
  }
  .search-wrap input{
    width:100%;
    padding:13px 44px 13px 16px;
    border-radius:12px;
    border:none;
    font-size:15px;
    background:#fff;
    color:var(--ink);
    outline:none;
  }
  .search-wrap input:focus{
    box-shadow:0 0 0 3px rgba(200,121,44,.45);
  }
  .search-wrap svg{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    width:18px;
    height:18px;
    stroke:var(--sub);
  }
  .org-tabs{
    display:flex;
    gap:8px;
    margin-top:14px;
    max-width:760px;
    flex-wrap:wrap;
  }
  .org-tab{
    padding:8px 16px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.28);
    background:rgba(255,255,255,.06);
    color:#dce6f4;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
    transition:.15s;
  }
  .org-tab.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .dept-chips{
    max-width:1080px;
    margin:16px auto 0;
    padding:0 20px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .chip{
    padding:6px 13px;
    border-radius:999px;
    border:1px solid var(--line);
    background:#fff;
    font-size:12.5px;
    color:var(--sub);
    cursor:pointer;
    white-space:nowrap;
    transition:.15s;
  }
  .chip.active{
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
    font-weight:600;
  }
  main{
    max-width:1080px;
    margin:0 auto;
    padding:18px 20px 60px;
  }
  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin:6px 2px 12px;
    font-size:12.5px;
    color:var(--sub);
  }
  .meta-row b{color:var(--navy);}
  .group{
    margin-bottom:22px;
  }
  .group-title{
    font-size:13.5px;
    font-weight:700;
    color:var(--navy);
    padding:0 2px 8px;
    border-bottom:2px solid var(--navy);
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .group-title .cnt{
    font-size:11.5px;
    font-weight:500;
    color:var(--sub);
  }
  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:10px;
    margin-top:10px;
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    display:flex;
    flex-direction:column;
    gap:3px;
  }
  .card .team{
    font-size:11px;
    color:var(--accent);
    font-weight:700;
  }
  .card .nameline{
    display:flex;
    align-items:baseline;
    gap:6px;
  }
  .card .name{
    font-size:15.5px;
    font-weight:700;
    color:var(--ink);
  }
  .card .title{
    font-size:12px;
    color:var(--sub);
  }
  .card a.phone{
    margin-top:4px;
    font-size:13.5px;
    color:var(--blue);
    text-decoration:none;
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:5px;
  }
  .card a.phone:hover{text-decoration:underline;}
  .card .phone.none{
    margin-top:4px;
    font-size:13px;
    color:#aab2bf;
  }
  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--sub);
    font-size:14px;
  }
  @media (max-width:480px){
    header{padding:20px 14px 18px;}
    header h1{font-size:16.5px;}
    .card-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>

let currentOrg = '전체';
let currentDept = '전체';

const orgTabsEl = document.getElementById('orgTabs');
const deptChipsEl = document.getElementById('deptChips');
const resultsEl = document.getElementById('results');
const searchInput = document.getElementById('searchInput');
const resultCountEl = document.getElementById('resultCount');
const scopeLabelEl = document.getElementById('scopeLabel');

const DEPT_ORDER = {
  '서부교육지원청': ['교육장','광산교육지원센터','교육지원국','유초등교육지원과','중등특수교육지원과','체육인성교육지원과','행정지원국','행정지원과','평생교육복지과','학교시설지원과','학교지원센터'],
  '동부교육지원청': ['교육장','교육지원국','유초등교육지원과','중등특수교육지원과','체육인성교육지원과','행정지원국','행정지원과','평생교육복지과','학교시설지원과','학교지원센터']
};

function deptRank(org, dept){
  const list = DEPT_ORDER[org] || [];
  const idx = list.findIndex(p => dept.startsWith(p));
  return idx === -1 ? list.length : idx;
}

function deptOrder(org){
  const seen = [];
  STAFF.forEach(r=>{
    if(org!=='전체' && r.org!==org) return;
    if(!seen.includes(r.dept)) seen.push(r.dept);
  });
  seen.sort((a,b)=>{
    const orgOfA = STAFF.find(r=>r.dept===a).org;
    const orgOfB = STAFF.find(r=>r.dept===b).org;
    return deptRank(orgOfA, a) - deptRank(orgOfB, b);
  });
  return seen;
}

function renderOrgTabs(){
  orgTabsEl.innerHTML = ORG_LIST.map(o=>{
    const cnt = o==='전체' ? STAFF.length : STAFF.filter(r=>r.org===o).length;
    return `<div class="org-tab ${o===currentOrg?'active':''}" data-org="${o}">${o} <span style="opacity:.65">(${cnt})</span></div>`;
  }).join('');
  orgTabsEl.querySelectorAll('.org-tab').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentOrg = el.dataset.org;
      currentDept = '전체';
      renderOrgTabs();
      renderDeptChips();
      renderResults();
    });
  });
}

function renderDeptChips(){
  const depts = deptOrder(currentOrg);
  const chips = ['전체', ...depts];
  deptChipsEl.innerHTML = chips.map(d=>{
    const label = d.replace(/\([^)]*\)/,'').trim();
    return `<div class="chip ${d===currentDept?'active':''}" data-dept="${encodeURIComponent(d)}">${label}</div>`;
  }).join('');
  deptChipsEl.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentDept = decodeURIComponent(el.dataset.dept);
      renderDeptChips();
      renderResults();
    });
  });
}

function telHref(phone, org){
  if(!phone) return null;
  let digits = String(phone).replace(/[^0-9]/g,'');
  if(!digits) return null;
  if(digits.length <= 4){
    const prefix = org === '서부교육지원청' ? '600' : '605';
    digits = prefix + digits;
  }
  return 'tel:062' + digits;
}

function displayPhone(phone, org){
  if(!phone) return '';
  let digits = String(phone).replace(/[^0-9]/g,'');
  if(digits.length <= 4){
    const prefix = org === '서부교육지원청' ? '600' : '605';
    return `062-${prefix}-${digits}`;
  }
  if(/^\d{3}-\d{4}$/.test(phone) || /^\d{6,7}$/.test(digits)){
    return `062-${phone}`;
  }
  return phone;
}

function matchesSearch(r, q){
  if(!q) return true;
  const hay = `${r.name} ${r.dept} ${r.team} ${r.title} ${r.phone}`.toLowerCase();
  return hay.includes(q.toLowerCase());
}

function renderResults(){
  const q = searchInput.value.trim();
  let filtered = STAFF.filter(r=>{
    if(currentOrg!=='전체' && r.org!==currentOrg) return false;
    if(currentDept!=='전체' && r.dept!==currentDept) return false;
    return matchesSearch(r, q);
  });

  resultCountEl.textContent = filtered.length;
  scopeLabelEl.textContent = currentOrg + (currentDept!=='전체' ? ' · ' + currentDept.replace(/\([^)]*\)/,'').trim() : '');

  if(filtered.length===0){
    resultsEl.innerHTML = '<div class="empty">검색 결과가 없습니다. 다른 검색어를 입력해 보세요.</div>';
    return;
  }

  // group by org > dept
  const groups = {};
  const order = [];
  filtered.forEach(r=>{
    const key = r.org + '|||' + r.dept;
    if(!groups[key]){ groups[key]=[]; order.push(key); }
    groups[key].push(r);
  });
  const ORG_RANK = {'서부교육지원청':0,'동부교육지원청':1};
  order.sort((ka,kb)=>{
    const [orgA, deptA] = ka.split('|||');
    const [orgB, deptB] = kb.split('|||');
    const orgDiff = (ORG_RANK[orgA]??9) - (ORG_RANK[orgB]??9);
    if(orgDiff !== 0) return orgDiff;
    return deptRank(orgA, deptA) - deptRank(orgB, deptB);
  });

  resultsEl.innerHTML = order.map(key=>{
    const [org, dept] = key.split('|||');
    const items = groups[key];
    const deptLabel = dept;
    const cards = items.map(r=>{
      const href = telHref(r.phone, r.org);
      const phoneStr = displayPhone(r.phone, r.org);
      const phoneHtml = href
        ? `<a class="phone" href="${href}">📞 ${phoneStr}</a>`
        : `<span class="phone none">전화번호 미기재</span>`;
      const teamHtml = r.team ? `<div class="team">${r.team}</div>` : '';
      return `<div class="card">
        ${teamHtml}
        <div class="nameline"><span class="name">${r.name}</span><span class="title">${r.title}</span></div>
        ${phoneHtml}
      </div>`;
    }).join('');
    return `<div class="group">
      <div class="group-title">${currentOrg==='전체' ? org+' · ' : ''}${deptLabel} <span class="cnt">${items.length}명</span></div>
      <div class="card-grid">${cards}</div>
    </div>`;
  }).join('');
}

searchInput.addEventListener('input', renderResults);

renderOrgTabs();
renderDeptChips();
renderResults();
</script>
</body>
</html>
